name: Test

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 4.1 is the minimum version declared in __init__.py's bl_info; 4.5 is the
        # latest confirmed-working version (see CLAUDE.md's "Known Blender version
        # support"). Blender 5.0 is known-broken and deliberately not tested here.
        blender-version: ["4.1", "4.5"]
    container:
      image: blenderkit/headless-blender:blender-${{ matrix.blender-version }}-stable
    steps:
      - uses: actions/checkout@v4

      - name: Run test suite in headless Blender
        run: /home/headless/blender/blender --background --python-exit-code 1 --python tests/run_tests.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyright fake-bpy-module-4.5
      - run: pyright --pythonpath "$(command -v python3)"
